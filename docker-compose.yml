services:
  db:
    image: postgres:15
    container_name: sisonke_db
    restart: always
    environment:
      POSTGRES_DB: sisonke_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
